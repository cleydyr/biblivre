<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <!-- An EUI-optimized golden gradient. Deep enough for white bgs, vibrant enough for dark bgs. -->
    <linearGradient id="euiLibraryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFC526" />
      <stop offset="100%" stop-color="#E69500" />
    </linearGradient>
  </defs>

  <!-- BACKGROUND REMOVED: The SVG is now transparent and inherits the EUI container background -->

  <g transform="translate(400, 300)">
    <!-- LADO ESQUERDO: Livro Estruturado -->
    <path d="M 0,110 L -160,30 L -160,-130 L 0,-50 Z" fill="url(#euiLibraryGrad)" opacity="0.95" />
    
    <!-- Linhas de corte sutis usando opacidade, adaptando-se a qualquer fundo -->
    <path d="M -40,70 L -160,10" stroke="currentColor" stroke-width="3" opacity="0.15" />
    <path d="M -80,30 L -160,-10" stroke="currentColor" stroke-width="3" opacity="0.15" />

    <!-- LADO DIREITO: Transição Digital -->
    <path d="M 0,110 L 60,80 L 60,-80 L 0,-50 Z" fill="url(#euiLibraryGrad)" />
    <path d="M 80,70 L 110,55 L 110,-55 L 80,-70 Z" fill="url(#euiLibraryGrad)" opacity="0.85" />
    
    <!-- FLUXO DE PIXELS -->
    <!-- Coluna 1 -->
    <rect x="130" y="-80" width="25" height="25" transform="skewY(-15)" fill="url(#euiLibraryGrad)" />
    <rect x="130" y="-30" width="25" height="25" transform="skewY(-15)" fill="url(#euiLibraryGrad)" opacity="0.9" />
    <rect x="130" y="20" width="25" height="25" transform="skewY(-15)" fill="url(#euiLibraryGrad)" />
    <rect x="130" y="70" width="25" height="25" transform="skewY(-15)" fill="url(#euiLibraryGrad)" opacity="0.7" />

    <!-- Coluna 2 -->
    <rect x="175" y="-110" width="20" height="20" transform="skewY(-15)" fill="url(#euiLibraryGrad)" />
    <rect x="175" y="-60" width="20" height="20" transform="skewY(-15)" fill="url(#euiLibraryGrad)" opacity="0.8" />
    <rect x="175" y="0" width="20" height="20" transform="skewY(-15)" fill="url(#euiLibraryGrad)" />
    <rect x="175" y="50" width="20" height="20" transform="skewY(-15)" fill="url(#euiLibraryGrad)" opacity="0.5" />

    <!-- Coluna 3 -->
    <rect x="220" y="-130" width="15" height="15" transform="skewY(-15)" fill="url(#euiLibraryGrad)" opacity="0.9" />
    <rect x="225" y="-80" width="12" height="12" transform="skewY(-15)" fill="url(#euiLibraryGrad)" />
    <rect x="220" y="-30" width="15" height="15" transform="skewY(-15)" fill="url(#euiLibraryGrad)" opacity="0.4" />
    <rect x="230" y="20" width="12" height="12" transform="skewY(-15)" fill="url(#euiLibraryGrad)" opacity="0.6" />
    
    <!-- Satélites -->
    <rect x="265" y="-150" width="10" height="10" transform="skewY(-15)" fill="url(#euiLibraryGrad)" opacity="0.8" />
    <rect x="270" y="-100" width="8" height="8" transform="skewY(-15)" fill="url(#euiLibraryGrad)" opacity="0.5" />
    <rect x="260" y="-50" width="10" height="10" transform="skewY(-15)" fill="url(#euiLibraryGrad)" opacity="0.3" />
  </g>
</svg>
