logging:
  level:
    org:
server:
  port: 8090

biblivre:
  circulation:
    # Override with env BIBLIVRE_CIRCULATION_RETURN_UNDO_WINDOW_SECONDS
    return-undo-window-seconds: 120

spring:
  mvc:
    view:
      prefix: /WEB-INF/jsp/
      suffix: .jsp

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  devtools:
    livereload:
      enabled: true
    restart:
      enabled: true