# CI workflow for Biblivre

name: CI

# Controls when the action will run. Triggers the workflow on push or pull request
# events but only for the master branch
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    env:
      NODE_ENV: production
      BABEL_ENV: production
      BUILD_PATH: ../resources/META-INF/resources/static/
      PUBLIC_URL: /static/

    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "25"
          cache: 'maven'
          server-id: ossindex
          server-username: ${{ secrets.OSSINDEX_USERNAME }}
          server-password: ${{ secrets.OSSINDEX_TOKEN }}
      - name: Get Yarn version
        id: yarn-version
        run: echo "version=$(grep -oP '(?<=<yarnVersion>)[^<]+' pom.xml)" >> $GITHUB_OUTPUT
      - name: Cache frontend-maven-plugin Node/Yarn downloads
        uses: actions/cache@v6
        with:
          path: ~/.m2/repository/com/github/eirslett
          key: frontend-maven-plugin-${{ runner.os }}-${{ steps.yarn-version.outputs.version }}
          restore-keys: |
            frontend-maven-plugin-${{ runner.os }}-
      - name: Cache Yarn dependencies
        uses: actions/cache@v6
        with:
          path: src/main/spa-frontend/node_modules
          key: yarn-${{ runner.os }}-${{ hashFiles('src/main/spa-frontend/yarn.lock') }}
          restore-keys: |
            yarn-${{ runner.os }}-
      - name: Cache Dart Sass downloads
        uses: actions/cache@v6
        with:
          path: ~/.dart-sass-maven-plugin
          key: dart-sass-${{ runner.os }}-${{ hashFiles('pom.xml') }}
          restore-keys: |
            dart-sass-${{ runner.os }}-
      - name: Build with Maven
        run: mvn -B -ntp clean test -Pgithub-ci
